<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#09090B"/>
  <g transform="translate(50,50) scale(0.9)">
    <!-- Hexagonal frame -->
    <path d="M0 -42 L36 -21 L36 21 L0 42 L-36 21 L-36 -21 Z" stroke="url(#fg)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <!-- Fiber strands -->
    <path d="M-26 -15 Q-10 -5 0 0" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M26 -15 Q10 -5 0 0" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M0 30 Q0 15 0 0" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Core -->
    <circle cx="0" cy="0" r="9" fill="url(#cg)"/>
    <circle cx="0" cy="0" r="5" fill="#38BDF8"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff" opacity="0.9"/>
    <!-- Endpoints -->
    <circle cx="-26" cy="-15" r="3.5" fill="#7DD3FC" opacity="0.7"/>
    <circle cx="26" cy="-15" r="3.5" fill="#38BDF8" opacity="0.7"/>
    <circle cx="0" cy="30" r="3.5" fill="#0EA5E9" opacity="0.7"/>
  </g>
</svg>

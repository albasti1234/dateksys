<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <defs>
    <!-- Fiber optic glow gradient -->
    <linearGradient id="fiber-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <!-- Convergence point radial glow -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle drop shadow for the mark -->
    <filter id="mark-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#38BDF8" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ LOGOMARK: Fiber Optic Convergence ═══ -->
  <g filter="url(#mark-shadow)" transform="translate(12, 10)">
    <!-- Outer hexagonal frame — represents infrastructure/network -->
    <path
      d="M50 5 L88 24 L88 62 L50 81 L12 62 L12 24 Z"
      stroke="url(#fiber-glow)"
      stroke-width="2"
      fill="none"
      stroke-linejoin="round"
    />

    <!-- Inner convergence structure — three fiber strands meeting at center -->
    <!-- Top-left fiber strand -->
    <path
      d="M22 28 Q35 35 50 43"
      stroke="#7DD3FC"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.9"
    />
    <!-- Top-right fiber strand -->
    <path
      d="M78 28 Q65 35 50 43"
      stroke="#38BDF8"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Bottom fiber strand -->
    <path
      d="M50 72 Q50 58 50 43"
      stroke="#0EA5E9"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
      opacity="0.9"
    />

    <!-- Secondary fiber traces — thinner, creating depth -->
    <path d="M28 22 Q40 32 50 43" stroke="#7DD3FC" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M72 22 Q60 32 50 43" stroke="#38BDF8" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M50 76 Q50 60 50 43" stroke="#0EA5E9" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- Convergence core — the central point where fibers meet -->
    <circle cx="50" cy="43" r="8" fill="url(#core-glow)"/>
    <circle cx="50" cy="43" r="4" fill="#38BDF8"/>
    <circle cx="50" cy="43" r="1.8" fill="#FFFFFF" opacity="0.9"/>

    <!-- Node endpoints — where fiber strands originate -->
    <circle cx="22" cy="28" r="3" fill="#7DD3FC" opacity="0.7"/>
    <circle cx="78" cy="28" r="3" fill="#38BDF8" opacity="0.7"/>
    <circle cx="50" cy="72" r="3" fill="#0EA5E9" opacity="0.7"/>

    <!-- Data pulse dots along fibers -->
    <circle cx="35" cy="35" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="65" cy="35" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="50" cy="58" r="1.5" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- ═══ WORDMARK: DATEKSYS ═══ -->
  <g transform="translate(120, 0)">
    <!-- Main brand name -->
    <text
      x="0"
      y="62"
      font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
      font-weight="700"
      font-size="52"
      letter-spacing="-0.02em"
      fill="#F4F4F5"
    >DATEK<tspan fill="url(#fiber-glow)">SYS</tspan></text>

    <!-- Tagline -->
    <text
      x="2"
      y="88"
      font-family="'DM Sans', 'Inter', system-ui, sans-serif"
      font-weight="400"
      font-size="13"
      letter-spacing="0.28em"
      fill="#A1A1AA"
      text-transform="uppercase"
    >IT INFRASTRUCTURE &amp; FIBER OPTICS</text>
  </g>
</svg>
